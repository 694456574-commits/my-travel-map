<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的足迹地图 - 全球版</title>
    <!-- 引入 Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; overflow: hidden; background: #222; }
        #map { width: 100vw; height: 100vh; background: #1a1a1a; }
        
        /* 左上角控制面板 */
        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            min-width: 250px;
        }
        .ui-panel h2 { margin: 0 0 10px 0; font-size: 18px; color: #333; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; color: #666; }
        .highlight-num { color: #ff9a00; font-weight: bold; }
        
        .btn {
            background: #ff9a00;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            font-size: 14px;
            transition: background 0.2s;
        }
        .btn:hover { background: #e68a00; }
        .btn.reset { background: #999; margin-top: 5px; }
        .btn.back { display: none; background: #333; }

        /* 地图交互样式 */
        .leaflet-container { background: #1a1a1a; }
        .leaflet-interactive { stroke: #ffffff; stroke-width: 0.8px; transition: fill 0.3s; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-panel">
    <h2>🌍 我的足迹</h2>
    <div class="stat-row">
        <span>已点亮地区:</span>
        <span id="count" class="highlight-num">0</span>
    </div>
    <button class="btn back" id="backBtn" onclick="goBackToWorld()">← 返回世界视图</button>
    <button class="btn" onclick="resetData()">重置所有数据</button>
</div>

<!-- 引入 Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // --- 1. 初始化地图 ---
    const map = L.map('map', {
        center: [35, 105],
        zoom: 3,
        zoomControl: false,
        minZoom: 2
    });

    // 添加深色底图
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap &copy; CARTO',
        subdomains: 'abcd',
        maxZoom: 19
    }).addTo(map);

    // --- 2. 全局变量 ---
    let visitedPlaces = JSON.parse(localStorage.getItem('myVisitedPlaces')) || {};
    let currentGeoJsonLayer = null;
    let currentLevel = 'world'; // 'world' or 'china'

    // --- 3. 核心样式函数 ---
    function getStyle(feature) {
        // 获取 ID：优先 name，兼容 id
        const id = feature.properties.name || feature.id;
        const isVisited = visitedPlaces[id];

        return {
            fillColor: isVisited ? '#ff9a00' : '#334455',
            fillOpacity: isVisited ? 0.9 : 0.4,
            color: '#ffffff',
            weight: 1
        };
    }

    // --- 4. 点击事件处理 ---
    function onFeatureClick(e, feature) {
        const name = feature.properties.name;
        const id = feature.properties.name || feature.id;

        // === 逻辑：下钻中国 ===
        if (currentLevel === 'world' && name === 'China') {
            enterChinaView();
            return;
        }

        // === 逻辑：点亮/取消 ===
        if (visitedPlaces[id]) {
            delete visitedPlaces[id];
        } else {
            visitedPlaces[id] = true;
        }
        
        saveAndRefresh();
    }

    // --- 5. 数据加载函数 ---
    async function loadMapData(url, level) {
        if (currentGeoJsonLayer) {
            map.removeLayer(currentGeoJsonLayer);
        }

        try {
            const response = await fetch(url);
            // 检查网络响应是否成功
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            const data = await response.json();
            
            currentGeoJsonLayer = L.geoJSON(data, {
                style: getStyle,
                onEachFeature: (feature, layer) => {
                    layer.on('click', (e) => onFeatureClick(e, feature));
                }
            }).addTo(map);
            
            currentLevel = level;
            updateUI();
        } catch (error) {
            console.error("加载地图数据失败:", error);
            alert(`数据加载失败！\n文件：${url}\n请检查 GitHub 上该文件是否存在且名称完全匹配。`);
        }
    }

    // --- 6. 视图切换逻辑 ---
    function enterChinaView() {
        map.flyTo([35.86, 104.19], 4, { duration: 1.5 });
        // 注意：这里必须和 GitHub 上的文件名完全一致
        loadMapData('china-cities.geojson', 'china');
    }

    function goBackToWorld() {
        map.flyTo([35, 105], 3, { duration: 1.5 });
        // 注意：这里修改为了匹配你 GitHub 上的实际文件名
        loadMapData('world.geo.json', 'world');
    }

    // --- 7. 辅助功能 ---
    function saveAndRefresh() {
        localStorage.setItem('myVisitedPlaces', JSON.stringify(visitedPlaces));
        updateUI();
        if (currentGeoJsonLayer) {
            currentGeoJsonLayer.setStyle(getStyle);
        }
    }

    function updateUI() {
        document.getElementById('count').innerText = Object.keys(visitedPlaces).length;
        const backBtn = document.getElementById('backBtn');
        if (currentLevel === 'china') {
            backBtn.style.display = 'block';
        } else {
            backBtn.style.display = 'none';
        }
    }

    function resetData() {
        if(confirm('确定要清空所有点亮记录吗？')) {
            localStorage.removeItem('myVisitedPlaces');
            visitedPlaces = {};
            saveAndRefresh();
        }
    }

    // --- 8. 启动 ---
    // 启动时加载世界地图，文件名已修正
    loadMapData('world.geo.json', 'world');

</script>
</body>
</html>
